    <style>
      /* Reset & Base Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      /* 🎨 GRADIENT ANIMASI PADA BACKGROUND (HITAM PUTIH) */
      body {
        background: linear-gradient(-45deg, #050505, #1a1a1a, #0a0a0a, #222222);
        background-size: 400% 400%;
        animation: gradientBG 12s ease infinite;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        overflow-x: hidden;
        position: relative;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* Background Particle Canvas */
      #particle-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 50%;
        animation: float-up linear infinite;
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      }

      @keyframes float-up {
        0% {
          transform: translateY(105vh) translateX(0) scale(0.8);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(-5vh) translateX(50px) scale(1.2);
          opacity: 0;
        }
      }

      /* ✨ GLOW & 💎 BORDER BERCAHAYA BERGERAK PADA CARD (HITAM PUTIH) */
      .card-wrapper {
        position: relative;
        width: 100%;
        max-width: 420px;
        border-radius: 24px;
        padding: 3px; /* Ruang untuk border luar */
        overflow: hidden;
        z-index: 2;
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
      }

      /* Efek garis border berputar menggunakan warna hitam, abu-abu, dan putih */
      .card-wrapper::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(
          from 0deg,
          transparent,
          #ffffff,
          #555555,
          transparent,
          #ffffff
        );
        animation: rotateBorder 6s linear infinite;
        z-index: -2;
      }

      @keyframes rotateBorder {
        100% {
          transform: rotate(360deg);
        }
      }

      /* Container Utama */
      .container {
        width: 100%;
        text-align: center;
        padding: 40px 25px;
        background: rgba(15, 15, 18, 0.94);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border-radius: 22px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Profil Manga Style */
      .profile-img {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #ffffff;
        margin-bottom: 24px;
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
        background-color: #2c2c2e;
      }

      /* 🌟 NAMA GHAAQXITER GLOW MONOKROM */
      .username {
        font-size: 1.6rem;
        font-weight: 800;
        margin-bottom: 35px;
        letter-spacing: 2px;
        color: #ffffff;
        text-transform: uppercase;
        text-shadow:
          0 0 10px rgba(255, 255, 255, 0.6),
          0 0 20px rgba(255, 255, 255, 0.3);
      }

      /* Link/Tombol Kontras Tinggi */
      .links-wrapper {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
      }

      .link-item {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 16px;
        background: #ffffff;
        color: #000000;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.95rem;
        border-radius: 12px;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        border: 1px solid #ffffff;
        letter-spacing: 0.5px;
        cursor: pointer;
      }

      .link-item svg {
        width: 20px;
        height: 20px;
        fill: #000000;
        transition: fill 0.3s ease;
        z-index: 2;
      }

      /* Teks berada di atas efek klik */
      .link-item span {
        z-index: 2;
      }

      /* Efek Hover */
      .link-item:hover {
        transform: translateY(-3px);
        background: transparent;
        color: #ffffff;
        box-shadow: 0 8px 25px rgba(255, 255, 255, 0.25);
        border-color: #ffffff;
      }

      .link-item:hover svg {
        fill: #ffffff;
      }

      /* 🎯 EFEK TOMBOL SAAT DIKLIK (RIPPLE EFFECT) */
      .ripple {
        position: absolute;
        background: rgba(0, 0, 0, 0.15);
        border-radius: 50%;
        transform: scale(0);
        animation: rippleEffect 0.6s linear;
        pointer-events: none;
        z-index: 1;
      }

      .link-item:hover .ripple {
        background: rgba(255, 255, 255, 0.3);
      }

      @keyframes rippleEffect {
        to {
          transform: scale(4);
          opacity: 0;
        }
      }
    </style>

    <script>
      // 1. SCRIPT EFEK PARTIKEL BACKGROUND
      function createParticles() {
        const container = document.getElementById("particle-container");
        const particleCount = 35;

        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement("div");
          particle.classList.add("particle");

          const size = Math.random() * 5 + 3;
          particle.style.width = `${size}px`;
          particle.style.height = `${size}px`;

          particle.style.left = `${Math.random() * 100}%`;
          particle.style.animationDuration = `${Math.random() * 8 + 7}s`;
          particle.style.animationDelay = `${Math.random() * 8}s`;
          container.appendChild(particle);
        }
      }
      window.addEventListener("DOMContentLoaded", createParticles);

      // 2. 🎯 SCRIPT RIPPLE EFFECT (EFEK OMBAK AIR SAAT TOMBOL DIKLIK)
      const buttons = document.querySelectorAll(".link-item");

      buttons.forEach((button) => {
        button.addEventListener("click", function (e) {
          const rect = button.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          const ripple = document.createElement("span");
          ripple.classList.add("ripple");
          ripple.style.left = `${x}px`;
          ripple.style.top = `${y}px`;

          this.appendChild(ripple);

          setTimeout(() => {
            ripple.remove();
          }, 600);
        });
      });
